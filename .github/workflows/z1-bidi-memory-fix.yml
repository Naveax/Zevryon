name: z1-bidi-memory-fix

on:
  pull_request:
    paths:
      - '.github/workflows/z1-bidi-memory-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Remove unused isolate reverse map and oversized sequence reserve
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/bidi_resolver.cpp')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  '    std::pmr::vector<std::int32_t>* matching_pdi,\n'
                  '    std::pmr::vector<std::int32_t>* matching_initiator,\n'
                  '    std::pmr::memory_resource* memory,\n',
                  '    std::pmr::vector<std::int32_t>* matching_pdi,\n'
                  '    std::pmr::memory_resource* memory,\n',
              ),
              (
                  '        matching_pdi->assign(units.size(), kNoMatch);\n'
                  '        matching_initiator->assign(units.size(), kNoMatch);\n',
                  '        matching_pdi->assign(units.size(), kNoMatch);\n',
              ),
              (
                  '                (*matching_pdi)[initiator] = static_cast<std::int32_t>(index);\n'
                  '                (*matching_initiator)[index] =\n'
                  '                    static_cast<std::int32_t>(initiator);\n',
                  '                (*matching_pdi)[initiator] = static_cast<std::int32_t>(index);\n',
              ),
              (
                  '        std::pmr::vector<std::uint32_t> sequence(memory);\n'
                  '        sequence.reserve(visible.size());\n',
                  '        std::pmr::vector<std::uint32_t> sequence(memory);\n'
                  '        sequence.reserve(std::min<std::size_t>(visible.size(), 256U));\n',
              ),
              (
                  '        std::pmr::vector<std::int32_t> matching_pdi(memory);\n'
                  '        std::pmr::vector<std::int32_t> matching_initiator(memory);\n'
                  '        if (!match_isolates(\n'
                  '                units,\n'
                  '                &matching_pdi,\n'
                  '                &matching_initiator,\n'
                  '                memory,\n'
                  '                error)) {\n',
                  '        std::pmr::vector<std::int32_t> matching_pdi(memory);\n'
                  '        if (!match_isolates(\n'
                  '                units,\n'
                  '                &matching_pdi,\n'
                  '                memory,\n'
                  '                error)) {\n',
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'expected one exact match, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8', newline='\n')
          PY
      - name: Commit exact working-set reduction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/bidi_resolver.cpp
          git commit -m 'Reduce bounded bidi working set'
          git push origin HEAD:${{ github.head_ref }}
