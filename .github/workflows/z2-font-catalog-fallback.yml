name: z2-font-catalog-fallback

on:
  pull_request:
    paths:
      - '.github/workflows/z2-font-catalog-fallback.yml'
      - 'CMakeLists.txt'
      - 'src/font_catalog.*'
      - 'src/font_fallback.*'
      - 'src/resource_ledger.*'
      - 'tests/font_catalog_fallback_tests.cpp'
      - 'docs/Z2A_FONT_CATALOG_FALLBACK.md'
  workflow_dispatch:

concurrency:
  group: z2-font-catalog-fallback-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ubuntu-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - run: cmake --build build --parallel 2 --target zevryon-font-catalog-fallback-tests
      - run: ctest --test-dir build -R font-catalog-fallback-tests --output-on-failure

  macos-strict:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build focused target
        run: |
          set -o pipefail
          cmake --build build --parallel 2 --target zevryon-font-catalog-fallback-tests \
            2>&1 | tee macos-font-catalog-fallback-build.log
      - run: ctest --test-dir build -R font-catalog-fallback-tests --output-on-failure
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-font-catalog-fallback-${{ github.sha }}
          path: macos-font-catalog-fallback-build.log
          if-no-files-found: warn

  windows-asan:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure MSVC AddressSanitizer
        run: cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON -DZEVRYON_ENABLE_SANITIZERS=ON
      - name: Build focused target
        shell: pwsh
        run: |
          cmake --build build-asan --config RelWithDebInfo --target zevryon-font-catalog-fallback-tests --parallel 2 2>&1 | Tee-Object -FilePath windows-font-catalog-fallback-asan-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Stage MSVC AddressSanitizer runtime
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) { throw 'vswhere.exe not found' }
          $installation = (& $vswhere -latest -products * -property installationPath).Trim()
          if (-not $installation) { throw 'Visual Studio installation not found' }
          $patterns = @(
            "$installation\VC\Tools\MSVC\*\bin\Hostx64\x64\clang_rt.asan*dynamic-x86_64.dll",
            "$installation\VC\Tools\Llvm\x64\bin\clang_rt.asan*dynamic-x86_64.dll"
          )
          $runtimes = @($patterns | ForEach-Object {
            Get-ChildItem -Path $_ -File -ErrorAction SilentlyContinue
          })
          if (-not $runtimes) { throw 'MSVC AddressSanitizer runtime DLL not found' }
          $output = Resolve-Path '.\build-asan\RelWithDebInfo'
          $runtimes | Group-Object Name | ForEach-Object {
            $runtime = $_.Group | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            Copy-Item $runtime.FullName -Destination $output -Force
          }
      - name: Run focused test under MSVC AddressSanitizer
        shell: pwsh
        run: |
          $env:ASAN_OPTIONS = 'halt_on_error=1:abort_on_error=1:symbolize=1'
          $env:ASAN_SAVE_DUMPS = 'windows-font-catalog-fallback-asan.dmp'
          $process = Start-Process `
            -FilePath '.\build-asan\RelWithDebInfo\zevryon-font-catalog-fallback-tests.exe' `
            -NoNewWindow -Wait -PassThru `
            -RedirectStandardOutput 'windows-font-catalog-fallback-asan.stdout.log' `
            -RedirectStandardError 'windows-font-catalog-fallback-asan.stderr.log'
          "exit_code=$($process.ExitCode)" | Set-Content 'windows-font-catalog-fallback-asan.exit.log'
          Get-Content 'windows-font-catalog-fallback-asan.stdout.log' -ErrorAction SilentlyContinue
          Get-Content 'windows-font-catalog-fallback-asan.stderr.log' -ErrorAction SilentlyContinue
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-font-catalog-fallback-asan-${{ github.sha }}
          path: |
            windows-font-catalog-fallback-asan-build.log
            windows-font-catalog-fallback-asan.*.log
            windows-font-catalog-fallback-asan.dmp
          if-no-files-found: warn
