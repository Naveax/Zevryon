name: z2-opentype-directory

on:
  pull_request:
    paths:
      - '.github/workflows/z2-opentype-directory.yml'
      - 'src/opentype_directory.*'
      - 'src/resource_ledger.*'
      - 'src/ledger_memory_resource.*'
      - 'tests/opentype_directory_tests.cpp'
      - 'docs/Z2B1_OPENTYPE_DIRECTORY.md'
  workflow_dispatch:

concurrency:
  group: z2-opentype-directory-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unix-strict:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build focused parser with strict warnings
        shell: bash
        run: |
          set -o pipefail
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -I src \
            src/resource_ledger.cpp \
            src/ledger_memory_resource.cpp \
            src/opentype_directory.cpp \
            tests/opentype_directory_tests.cpp \
            -o opentype-directory-tests \
            2>&1 | tee opentype-directory-build.log
      - name: Run focused parser tests
        run: ./opentype-directory-tests | tee opentype-directory-test.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: z2-opentype-directory-${{ matrix.os }}-${{ github.sha }}
          path: |
            opentype-directory-build.log
            opentype-directory-test.log
          if-no-files-found: warn

  linux-sanitizers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build with AddressSanitizer and UndefinedBehaviorSanitizer
        shell: bash
        run: |
          set -o pipefail
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -fno-omit-frame-pointer -fsanitize=address,undefined \
            -I src \
            src/resource_ledger.cpp \
            src/ledger_memory_resource.cpp \
            src/opentype_directory.cpp \
            tests/opentype_directory_tests.cpp \
            -o opentype-directory-sanitized \
            2>&1 | tee opentype-directory-sanitizer-build.log
      - name: Run sanitizer test
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./opentype-directory-sanitized | tee opentype-directory-sanitizer.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: z2-opentype-directory-linux-sanitizers-${{ github.sha }}
          path: |
            opentype-directory-sanitizer-build.log
            opentype-directory-sanitizer.log
          if-no-files-found: warn

  windows-asan:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build focused parser with MSVC AddressSanitizer
        shell: cmd
        run: |
          cl /nologo /std:c++20 /W4 /WX /permissive- /EHsc /MD /fsanitize=address /Zi /I src src\resource_ledger.cpp src\ledger_memory_resource.cpp src\opentype_directory.cpp tests\opentype_directory_tests.cpp /Fe:opentype-directory-asan.exe /link /INCREMENTAL:NO > opentype-directory-msvc-build.log 2>&1
          set CL_EXIT=%ERRORLEVEL%
          type opentype-directory-msvc-build.log
          exit /b %CL_EXIT%
      - name: Run MSVC AddressSanitizer test with captured diagnostics
        shell: pwsh
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=0
        run: |
          & .\opentype-directory-asan.exe *> opentype-directory-msvc-asan.log
          $exitCode = $LASTEXITCODE
          if (Test-Path opentype-directory-msvc-asan.log) {
            Get-Content opentype-directory-msvc-asan.log
          }
          if ($exitCode -ne 0) {
            throw "MSVC AddressSanitizer test failed with exit code $exitCode"
          }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: z2-opentype-directory-windows-asan-${{ github.sha }}
          path: |
            opentype-directory-msvc-build.log
            opentype-directory-msvc-asan.log
          if-no-files-found: warn
