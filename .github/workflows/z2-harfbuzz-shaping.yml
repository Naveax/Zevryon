name: z2-harfbuzz-shaping

on:
  pull_request:
    paths:
      - '.github/workflows/z2-harfbuzz-shaping.yml'
      - 'cmake/coretext_discovery.cmake'
      - 'cmake/harfbuzz_shaping.cmake'
      - 'src/font_resource_sfnt.*'
      - 'src/font_resource_integrity.*'
      - 'src/verified_font_resource.*'
      - 'src/harfbuzz_shaper.*'
      - 'src/harfbuzz_verified_shaper.cpp'
      - 'src/harfbuzz_shaping_benchmark_main.cpp'
      - 'src/grapheme_segmenter.*'
      - 'src/unicode_script.*'
      - 'src/resource_ledger.*'
      - 'tests/harfbuzz_shaper_tests.cpp'
      - 'tests/harfbuzz_verified_input_tests.cpp'
      - 'tests/harfbuzz_verified_resource_tests.cpp'
      - 'docs/Z2B1_HARFBUZZ_SHAPING.md'
      - 'docs/Z2B2_VERIFIED_HARFBUZZ_INPUT.md'
      - 'docs/Z2B4_HARFBUZZ_VERIFIED_RESOURCE.md'
  workflow_dispatch:

concurrency:
  group: z2-harfbuzz-shaping-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ubuntu-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Install HarfBuzz and fixed test fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libharfbuzz-dev \
            fonts-dejavu-core \
            fonts-noto-core
      - name: Configure strict Release build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DZEVRYON_ENABLE_HARFBUZZ_SHAPING=ON \
            -DZEVRYON_TEST_FONT_LATIN=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf \
            -DZEVRYON_TEST_FONT_DEVANAGARI=/usr/share/fonts/truetype/noto/NotoSansDevanagari-Regular.ttf
      - name: Build backend, three test groups, and benchmark
        run: |
          set -o pipefail
          cmake --build build --parallel 2 --target \
            zevryon-harfbuzz-shaper-tests \
            zevryon-harfbuzz-verified-input-tests \
            zevryon-harfbuzz-verified-resource-tests \
            zevryon-harfbuzz-shaping-benchmark \
            2>&1 | tee ubuntu-harfbuzz-build.log
      - name: Run shaping, raw-input, and immutable-resource tests
        run: |
          set -o pipefail
          ctest --test-dir build \
            -R '^harfbuzz-(shaper|verified-input|verified-resource)-tests$' \
            --output-on-failure \
            2>&1 | tee ubuntu-harfbuzz-test.log
      - name: Run raw and immutable-resource 16 KiB distributions
        run: |
          for run in 1 2 3; do
            ./build/zevryon-harfbuzz-shaping-benchmark \
              /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf \
              /usr/share/fonts/truetype/noto/NotoSansDevanagari-Regular.ttf \
              > "harfbuzz-benchmark-raw-${run}.jsonl"
            ./build/zevryon-harfbuzz-shaping-benchmark \
              /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf \
              /usr/share/fonts/truetype/noto/NotoSansDevanagari-Regular.ttf \
              --verified-resource \
              > "harfbuzz-benchmark-resource-${run}.jsonl"
          done
      - name: Enforce shaping equivalence and final latency gates
        run: |
          python3 - <<'PY'
          import json, statistics
          expected = {"latin", "arabic", "devanagari"}
          improvement_limits = {
              "latin": 0.80,
              "arabic": 0.75,
              "devanagari": 0.97,
          }
          equivalent = (
              "input_utf8_bytes", "input_codepoints", "input_clusters",
              "output_glyphs", "output_bytes", "unsafe_to_break_glyphs",
              "unsafe_to_concat_glyphs", "total_x_advance", "total_y_advance",
              "units_per_em", "glyph_current_bytes", "glyph_peak_bytes",
          )
          p50_ratios = {case: [] for case in expected}
          for run in range(1, 4):
              def read(path):
                  rows = [json.loads(line) for line in open(path, encoding="utf-8") if line.strip()]
                  assert len(rows) == 3, (path, len(rows))
                  assert {row["case"] for row in rows} == expected
                  return {row["case"]: row for row in rows}
              raw = read(f"harfbuzz-benchmark-raw-{run}.jsonl")
              resource = read(f"harfbuzz-benchmark-resource-{run}.jsonl")
              for case in sorted(expected):
                  a = raw[case]
                  b = resource[case]
                  assert a["schema"] == b["schema"] == "zevryon.harfbuzz-shaping-benchmark.v1"
                  assert a["mode"] == "uncached_full_call"
                  assert b["mode"] == "verified_resource_call"
                  assert a["used_verified_font_resource"] is False
                  assert a["performed_inline_font_verification"] is True
                  assert a["verified_font_resource_id"] == 0
                  assert b["used_verified_font_resource"] is True
                  assert b["performed_inline_font_verification"] is False
                  assert b["verified_font_resource_id"] > 0
                  for key in equivalent:
                      assert a[key] == b[key], (run, case, key, a[key], b[key])
                  for row in (a, b):
                      assert row["input_utf8_bytes"] >= 16000
                      assert row["output_glyphs"] > 0
                      assert row["output_bytes"] == row["output_glyphs"] * 28
                      assert row["glyph_current_bytes"] == row["output_bytes"]
                      assert row["glyph_peak_bytes"] == row["output_bytes"]
                      assert row["unsafe_to_concat_glyphs"] > 0
                      assert row["accounting_clean"] is True
                      assert row["within_hard_limits"] is True
                  assert a["p95_ms"] <= 3.0
                  assert a["p99_ms"] <= 4.0
                  assert a["maximum_ms"] <= 8.0
                  assert b["p95_ms"] <= 2.0
                  assert b["p99_ms"] <= 2.5
                  assert b["maximum_ms"] <= 4.0
                  p50_ratios[case].append(b["p50_ms"] / a["p50_ms"])
              assert raw["arabic"]["unsafe_to_break_glyphs"] > 0
              assert resource["arabic"]["unsafe_to_break_glyphs"] > 0
          for case, limit in improvement_limits.items():
              ratio = statistics.median(p50_ratios[case])
              assert ratio <= limit, (case, ratio, limit, p50_ratios[case])
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: z2-harfbuzz-shaping-${{ github.sha }}
          path: |
            ubuntu-harfbuzz-build.log
            ubuntu-harfbuzz-test.log
            harfbuzz-benchmark-*.jsonl
          if-no-files-found: warn

  ubuntu-asan-ubsan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install HarfBuzz and fixed test fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libharfbuzz-dev \
            fonts-dejavu-core \
            fonts-noto-core
      - name: Configure sanitizers
        run: |
          cmake -S . -B build-sanitized \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=ON \
            -DZEVRYON_ENABLE_SANITIZERS=ON \
            -DZEVRYON_ENABLE_HARFBUZZ_SHAPING=ON \
            -DZEVRYON_TEST_FONT_LATIN=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf \
            -DZEVRYON_TEST_FONT_DEVANAGARI=/usr/share/fonts/truetype/noto/NotoSansDevanagari-Regular.ttf
      - name: Build all shaping tests under sanitizers
        run: |
          set -o pipefail
          cmake --build build-sanitized --parallel 2 --target \
            zevryon-harfbuzz-shaper-tests \
            zevryon-harfbuzz-verified-input-tests \
            zevryon-harfbuzz-verified-resource-tests \
            2>&1 | tee ubuntu-harfbuzz-sanitizer-build.log
      - name: Run all shaping tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -o pipefail
          ctest --test-dir build-sanitized \
            -R '^harfbuzz-(shaper|verified-input|verified-resource)-tests$' \
            --output-on-failure \
            2>&1 | tee ubuntu-harfbuzz-sanitizer-test.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: z2-harfbuzz-shaping-sanitized-${{ github.sha }}
          path: |
            ubuntu-harfbuzz-sanitizer-build.log
            ubuntu-harfbuzz-sanitizer-test.log
          if-no-files-found: warn
