name: vendor-bidi-mirroring-header

on:
  push:
    branches:
      - work/z1-bidi-mirror-runtime
    paths:
      - '.github/workflows/vendor-bidi-mirroring-header.yml'
      - 'tools/generate_unicode_bidi_mirroring.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vendor-bidi-mirroring-header-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vendor-generated-header:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/z1-bidi-mirror-runtime
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch pinned Unicode 17 sources
        run: |
          mkdir -p ucd generated
          curl --fail --location --retry 3 \
            https://www.unicode.org/Public/17.0.0/ucd/UnicodeData.txt \
            --output ucd/UnicodeData.txt
          curl --fail --location --retry 3 \
            https://www.unicode.org/Public/17.0.0/ucd/BidiMirroring.txt \
            --output ucd/BidiMirroring.txt
          echo '2e1efc1dcb59c575eedf5ccae60f95229f706ee6d031835247d843c11d96470c  ucd/UnicodeData.txt' | sha256sum --check --strict
          echo 'a2f16fb873ab4fcdf3221cb1a8a85a134ddd6ed03603181823ff5206af3741ce  ucd/BidiMirroring.txt' | sha256sum --check --strict
      - name: Generate pinned header
        run: |
          python tools/generate_unicode_bidi_mirroring.py \
            --unicode-data ucd/UnicodeData.txt \
            --bidi-mirroring ucd/BidiMirroring.txt \
            --output-header generated/unicode_bidi_mirroring.generated.hpp \
            --output-report generated/report.json
          grep -q '12477c826aad16df4fff77df606e37b69a194a3f53b1778337ad5881338fa9b9' generated/report.json
          cp generated/unicode_bidi_mirroring.generated.hpp \
             src/unicode_bidi_mirroring.generated.hpp
      - name: Commit only deterministic output
        run: |
          if git diff --quiet -- src/unicode_bidi_mirroring.generated.hpp; then
            echo 'Generated header already matches the pinned data.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/unicode_bidi_mirroring.generated.hpp
          git commit -m 'generated: vendor Unicode 17 bidi mirroring data'
          git push origin HEAD:work/z1-bidi-mirror-runtime
