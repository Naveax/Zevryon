name: z1-bidi-neutral

on:
  pull_request:
    paths:
      - '.github/workflows/z1-bidi-neutral.yml'
      - 'CMakeLists.txt'
      - 'src/bidi_neutral.*'
      - 'src/unicode_bidi_brackets*'
      - 'src/resource_ledger.*'
      - 'tests/bidi_neutral_tests.cpp'
      - 'docs/Z1D_BIDI_NEUTRALS.md'
  workflow_dispatch:

concurrency:
  group: z1-bidi-neutral-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ubuntu-neutral-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - run: cmake --build build --parallel 2 --target zevryon-bidi-neutral-tests
      - run: ctest --test-dir build -R bidi-neutral-tests --output-on-failure

  macos-neutral-strict:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build focused neutral target
        run: |
          set -o pipefail
          cmake --build build --parallel 2 --target zevryon-bidi-neutral-tests \
            2>&1 | tee macos-bidi-neutral-build.log
      - run: ctest --test-dir build -R bidi-neutral-tests --output-on-failure
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-bidi-neutral-${{ github.sha }}
          path: macos-bidi-neutral-build.log
          if-no-files-found: warn

  windows-neutral-asan:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure MSVC AddressSanitizer
        run: cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON -DZEVRYON_ENABLE_SANITIZERS=ON
      - name: Build neutral test with MSVC AddressSanitizer
        shell: pwsh
        run: |
          cmake --build build-asan --config RelWithDebInfo --target zevryon-bidi-neutral-tests --parallel 2 2>&1 | Tee-Object -FilePath windows-bidi-neutral-asan-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Stage MSVC AddressSanitizer runtime
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) { throw 'vswhere.exe not found' }
          $installation = (& $vswhere -latest -products * -property installationPath).Trim()
          if (-not $installation) { throw 'Visual Studio installation not found' }
          $patterns = @(
            "$installation\VC\Tools\MSVC\*\bin\Hostx64\x64\clang_rt.asan*dynamic-x86_64.dll",
            "$installation\VC\Tools\Llvm\x64\bin\clang_rt.asan*dynamic-x86_64.dll"
          )
          $runtimes = @($patterns | ForEach-Object {
            Get-ChildItem -Path $_ -File -ErrorAction SilentlyContinue
          })
          if (-not $runtimes) { throw 'MSVC AddressSanitizer runtime DLL not found' }
          $output = Resolve-Path '.\build-asan\RelWithDebInfo'
          $runtimes | Group-Object Name | ForEach-Object {
            $runtime = $_.Group | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            Copy-Item $runtime.FullName -Destination $output -Force
          }
      - name: Run neutral tests under MSVC AddressSanitizer
        shell: pwsh
        run: |
          $env:ASAN_OPTIONS = 'halt_on_error=1:abort_on_error=1:symbolize=1'
          $env:ASAN_SAVE_DUMPS = 'windows-bidi-neutral-asan.dmp'
          $process = Start-Process `
            -FilePath '.\build-asan\RelWithDebInfo\zevryon-bidi-neutral-tests.exe' `
            -NoNewWindow -Wait -PassThru `
            -RedirectStandardOutput 'windows-bidi-neutral-asan.stdout.log' `
            -RedirectStandardError 'windows-bidi-neutral-asan.stderr.log'
          "exit_code=$($process.ExitCode)" | Set-Content 'windows-bidi-neutral-asan.exit.log'
          Get-Content 'windows-bidi-neutral-asan.stdout.log' -ErrorAction SilentlyContinue
          Get-Content 'windows-bidi-neutral-asan.stderr.log' -ErrorAction SilentlyContinue
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-bidi-neutral-asan-${{ github.sha }}
          path: |
            windows-bidi-neutral-asan-build.log
            windows-bidi-neutral-asan.*.log
            windows-bidi-neutral-asan.dmp
          if-no-files-found: warn
