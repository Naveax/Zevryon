name: z2-font-resource-sfnt

on:
  pull_request:
    paths:
      - '.github/workflows/z2-font-resource-sfnt.yml'
      - 'CMakeLists.txt'
      - 'cmake/coretext_discovery.cmake'
      - 'cmake/font_resource_sfnt.cmake'
      - 'src/font_resource_sfnt.*'
      - 'tests/font_resource_sfnt_tests.cpp'
      - 'docs/Z2B1_FONT_RESOURCE_SFNT.md'
  workflow_dispatch:

concurrency:
  group: z2-font-resource-sfnt-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  strict:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Configure strict Release build
        shell: bash
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build focused production target
        shell: bash
        run: >-
          cmake --build build --config Release --parallel 2
          --target zevryon-font-resource-sfnt-tests
      - name: Run adversarial parser tests
        shell: bash
        run: >-
          ctest --test-dir build -C Release
          -R '^font-resource-sfnt-tests$' --output-on-failure

  sanitizer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Configure AddressSanitizer and UndefinedBehaviorSanitizer
        shell: bash
        run: >-
          cmake -S . -B build-sanitized
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DBUILD_TESTING=ON
          -DZEVRYON_ENABLE_SANITIZERS=ON
      - name: Build focused production target under sanitizers
        shell: bash
        run: >-
          cmake --build build-sanitized --parallel 2
          --target zevryon-font-resource-sfnt-tests
      - name: Run adversarial parser tests under sanitizers
        shell: bash
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: >-
          ctest --test-dir build-sanitized
          -R '^font-resource-sfnt-tests$' --output-on-failure
