name: z2-coretext-discovery

on:
  pull_request:
    paths:
      - '.github/workflows/z2-coretext-discovery.yml'
      - 'CMakeLists.txt'
      - 'cmake/coretext_discovery.cmake'
      - 'src/coretext_discovery.*'
      - 'src/font_discovery_generation.*'
      - 'src/font_catalog.*'
      - 'tests/coretext_discovery_tests.cpp'
      - 'docs/Z2A5_CORETEXT_DISCOVERY.md'
  workflow_dispatch:

concurrency:
  group: z2-coretext-discovery-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos-strict:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Configure strict Release build
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DZEVRYON_ENABLE_CORETEXT_DISCOVERY=ON
      - name: Build focused adapter and integration test
        run: |
          set -o pipefail
          cmake --build build --parallel 2 --target zevryon-coretext-discovery-tests \
            2>&1 | tee macos-coretext-build.log
      - name: Run real system-font integration test
        run: |
          set -o pipefail
          ./build/zevryon-coretext-discovery-tests \
            > macos-coretext.stdout.log \
            2> macos-coretext.stderr.log
          cat macos-coretext.stdout.log
          cat macos-coretext.stderr.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: z2-coretext-discovery-${{ github.sha }}
          path: |
            macos-coretext-build.log
            macos-coretext.*.log
          if-no-files-found: warn

  macos-asan-ubsan:
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Configure AppleClang sanitizers
        run: cmake -S . -B build-sanitized -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON -DZEVRYON_ENABLE_SANITIZERS=ON -DZEVRYON_ENABLE_CORETEXT_DISCOVERY=ON
      - name: Build focused adapter under sanitizers
        run: |
          set -o pipefail
          cmake --build build-sanitized --parallel 2 --target zevryon-coretext-discovery-tests \
            2>&1 | tee macos-coretext-sanitizer-build.log
      - name: Run real system-font test under sanitizers
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          set -o pipefail
          ./build-sanitized/zevryon-coretext-discovery-tests \
            > macos-coretext-sanitizer.stdout.log \
            2> macos-coretext-sanitizer.stderr.log
          cat macos-coretext-sanitizer.stdout.log
          cat macos-coretext-sanitizer.stderr.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: z2-coretext-discovery-sanitized-${{ github.sha }}
          path: |
            macos-coretext-sanitizer-build.log
            macos-coretext-sanitizer.*.log
          if-no-files-found: warn
