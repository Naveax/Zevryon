name: z1-bidi-w7-fix

on:
  pull_request:
    paths:
      - '.github/workflows/z1-bidi-w7-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Clear numeric state when W7 converts EN to L
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/bidi_resolver.cpp')
          text = path.read_text(encoding='utf-8')
          needle = (
              '        } else if (unit.current == BidiClass::EN && last_strong == BidiClass::L) {\n'
              '            unit.current = BidiClass::L;\n'
              '        }\n'
              '    }\n'
              '}\n\n'
              'bool brackets_match'
          )
          replacement = (
              '        } else if (unit.current == BidiClass::EN && last_strong == BidiClass::L) {\n'
              '            unit.current = BidiClass::L;\n'
              '            set_flag(&unit, kFlagNumeric, false);\n'
              '        }\n'
              '    }\n'
              '}\n\n'
              'bool brackets_match'
          )
          if text.count(needle) != 1:
              raise RuntimeError(f'expected one W7 block, found {text.count(needle)}')
          path.write_text(text.replace(needle, replacement, 1), encoding='utf-8', newline='\n')
          PY
      - name: Commit exact W7 fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/bidi_resolver.cpp
          git commit -m 'Clear numeric state after bidi W7 conversion'
          git push origin HEAD:${{ github.head_ref }}
