name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pytest
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build on Unix
        if: runner.os != 'Windows'
        run: cmake --build build --config Release --parallel 2
      - name: Build on Windows with diagnostic log
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel 2 2>&1 | Tee-Object -FilePath windows-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload Windows compiler log
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.sha }}
          path: windows-build.log
          if-no-files-found: warn
      - name: Run CTest on Unix
        if: runner.os != 'Windows'
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Run CTest on Windows with diagnostic log
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ctest --test-dir build -C Release --output-on-failure 2>&1 | Tee-Object -FilePath windows-ctest.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload Windows CTest log
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-ctest-${{ github.sha }}
          path: windows-ctest.log
          if-no-files-found: warn
      - run: python -m pytest -q tests

  giant-record-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - run: cmake --build build --parallel 2
      - name: Run 128 MB corpus with a real 64 MiB record
        run: >-
          python scripts/massivedoc_benchmark.py
          --logical-bytes 134217728
          --records 131072
          --segment-mib 16
          --largest-record-limit-bytes 67108864
          --giant-record-bytes 67108864
          --work-dir "${{ runner.temp }}/zevryon-giant"
          --output evidence/ci/m1-giant-record.json
      - uses: actions/upload-artifact@v4
        with:
          name: m1-giant-record-${{ github.sha }}
          path: evidence/ci/m1-giant-record.json

  sanitizer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON -DZEVRYON_ENABLE_SANITIZERS=ON
      - run: cmake --build build --parallel 2
      - run: ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 ctest --test-dir build --output-on-failure

  windows-sanitizer:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure MSVC AddressSanitizer
        run: cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON -DZEVRYON_ENABLE_SANITIZERS=ON
      - name: Build MSVC AddressSanitizer
        shell: pwsh
        run: |
          cmake --build build-asan --config RelWithDebInfo --parallel 2 2>&1 | Tee-Object -FilePath windows-asan-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Run store tests under MSVC AddressSanitizer
        id: asan_store
        continue-on-error: true
        timeout-minutes: 8
        shell: pwsh
        run: |
          $env:ASAN_OPTIONS = "halt_on_error=1:abort_on_error=1:symbolize=1"
          $env:ASAN_SAVE_DUMPS = "windows-asan-store.dmp"
          $process = Start-Process `
            -FilePath ".\build-asan\RelWithDebInfo\zevryon-massivedoc-tests.exe" `
            -NoNewWindow -Wait -PassThru `
            -RedirectStandardOutput "windows-asan-store.stdout.log" `
            -RedirectStandardError "windows-asan-store.stderr.log"
          "exit_code=$($process.ExitCode)" | Set-Content "windows-asan-store.exit.log"
          Get-Content "windows-asan-store.stdout.log" -ErrorAction SilentlyContinue
          Get-Content "windows-asan-store.stderr.log" -ErrorAction SilentlyContinue
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
      - name: Run compact document tests under MSVC AddressSanitizer
        id: asan_compact
        if: always()
        continue-on-error: true
        timeout-minutes: 8
        shell: pwsh
        run: |
          $env:ASAN_OPTIONS = "halt_on_error=1:abort_on_error=1:symbolize=1"
          $env:ASAN_SAVE_DUMPS = "windows-asan-compact.dmp"
          $process = Start-Process `
            -FilePath ".\build-asan\RelWithDebInfo\zevryon-compact-document-tests.exe" `
            -NoNewWindow -Wait -PassThru `
            -RedirectStandardOutput "windows-asan-compact.stdout.log" `
            -RedirectStandardError "windows-asan-compact.stderr.log"
          "exit_code=$($process.ExitCode)" | Set-Content "windows-asan-compact.exit.log"
          Get-Content "windows-asan-compact.stdout.log" -ErrorAction SilentlyContinue
          Get-Content "windows-asan-compact.stderr.log" -ErrorAction SilentlyContinue
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
      - name: Enforce MSVC AddressSanitizer results
        if: always()
        shell: pwsh
        run: |
          $failed = $false
          foreach ($path in @("windows-asan-store.exit.log", "windows-asan-compact.exit.log")) {
            if (-not (Test-Path $path)) {
              Write-Error "missing sanitizer exit record: $path"
              $failed = $true
              continue
            }
            $line = Get-Content $path -Raw
            Write-Host "$path $line"
            if ($line -notmatch '^exit_code=0\s*$') { $failed = $true }
          }
          if ($failed) { exit 1 }
      - name: Upload Windows AddressSanitizer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-asan-${{ github.sha }}
          path: |
            windows-asan-build.log
            windows-asan-store.*.log
            windows-asan-store.dmp
            windows-asan-compact.*.log
            windows-asan-compact.dmp
          if-no-files-found: warn
