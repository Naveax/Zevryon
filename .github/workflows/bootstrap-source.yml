name: publish-source-tree

on:
  push:
    paths:
      - .bootstrap/READY
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct verified source archive
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import io
          import json
          from pathlib import Path
          import tarfile

          root = Path('.bootstrap')
          manifest = json.loads((root / 'm1-manifest.json').read_text(encoding='utf-8'))
          encoded = ''.join((root / name).read_text(encoding='ascii') for name in manifest['parts'])
          archive = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(archive).hexdigest()
          if digest != manifest['archive_sha256']:
              raise SystemExit(f'archive hash mismatch: {digest}')
          target = root / 'extracted'
          target.mkdir(parents=True, exist_ok=True)
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as bundle:
              bundle.extractall(target, filter='data')
          PY
      - name: Validate reconstructed source
        run: |
          cmake -S .bootstrap/extracted/bootstrap-engine -B .bootstrap/build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
          cmake --build .bootstrap/build -j2
          ctest --test-dir .bootstrap/build --output-on-failure
          cd .bootstrap/extracted
          PYTHONPATH=. python3 -m pytest -q tests/performance
      - name: Replace bootstrap with source tree
        run: |
          rsync -a --delete --exclude=.git --exclude=.bootstrap .bootstrap/extracted/ ./
          rm -rf .bootstrap
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "publish MassiveDoc M1 source tree"
          git push
