name: z1-bidi-mirroring-runtime

on:
  pull_request:
    paths:
      - '.github/workflows/z1-bidi-mirroring-runtime.yml'
      - 'CMakeLists.txt'
      - 'src/bidi_mirroring.*'
      - 'src/unicode_bidi_mirroring.*'
      - 'src/resource_ledger.*'
      - 'tests/bidi_mirroring_tests.cpp'
      - 'docs/Z1D_BIDI_MIRRORING_RUNTIME.md'
  workflow_dispatch:

concurrency:
  group: z1-bidi-mirroring-runtime-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runtime-certification:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch pinned Unicode 17 mirroring sources
        run: |
          mkdir -p ucd-17.0.0 evidence
          curl --fail --location --retry 3 \
            https://www.unicode.org/Public/17.0.0/ucd/UnicodeData.txt \
            --output ucd-17.0.0/UnicodeData.txt
          curl --fail --location --retry 3 \
            https://www.unicode.org/Public/17.0.0/ucd/BidiMirroring.txt \
            --output ucd-17.0.0/BidiMirroring.txt
          echo '2e1efc1dcb59c575eedf5ccae60f95229f706ee6d031835247d843c11d96470c  ucd-17.0.0/UnicodeData.txt' | sha256sum --check --strict
          echo 'a2f16fb873ab4fcdf3221cb1a8a85a134ddd6ed03603181823ff5206af3741ce  ucd-17.0.0/BidiMirroring.txt' | sha256sum --check --strict
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build focused runtime targets
        run: |
          cmake --build build --parallel 2 --target \
            zevryon-bidi-mirroring-tests \
            zevryon-bidi-mirroring-conformance \
            zevryon-bidi-mirroring-benchmark
      - run: ctest --test-dir build -R bidi-mirroring-tests --output-on-failure
      - name: Run full Unicode source-vs-runtime conformance
        run: |
          ./build/zevryon-bidi-mirroring-conformance \
            ucd-17.0.0/UnicodeData.txt \
            ucd-17.0.0/BidiMirroring.txt \
            > evidence/z1-bidi-mirroring-conformance.json
          cat evidence/z1-bidi-mirroring-conformance.json
      - name: Run three independent 64 KiB distributions under 108 KiB
        run: |
          ./build/zevryon-bidi-mirroring-benchmark 1024 110592 \
            > evidence/z1-bidi-mirroring-benchmark-1.json
          ./build/zevryon-bidi-mirroring-benchmark 1024 110592 \
            > evidence/z1-bidi-mirroring-benchmark-2.json
          ./build/zevryon-bidi-mirroring-benchmark 1024 110592 \
            > evidence/z1-bidi-mirroring-benchmark-3.json
      - name: Enforce final correctness, memory, and latency gates
        run: |
          python - <<'PY'
          import json, pathlib, statistics
          root = pathlib.Path('evidence')
          conformance = json.loads(
              (root / 'z1-bidi-mirroring-conformance.json').read_text()
          )
          assert conformance['schema'] == 'zevryon.bidi-mirroring-conformance.v1'
          assert conformance['unicode_version'] == '17.0.0'
          assert conformance['codepoints_scanned'] == 1114112
          assert conformance['mirrored_codepoints'] == 554
          assert conformance['exact_mappings'] == 354
          assert conformance['best_fit_mappings'] == 74
          assert conformance['glyph_only_codepoints'] == 126
          assert conformance['passed'] is True

          reports = [
              json.loads(
                  (root / f'z1-bidi-mirroring-benchmark-{index}.json').read_text()
              )
              for index in range(1, 4)
          ]
          for report in reports:
              assert report['schema'] == 'zevryon.bidi-mirroring-benchmark.v1'
              assert report['uax_version'] == 'Unicode 17.0.0 / UAX #9 revision 51'
              assert report['fixture_bytes'] == 65536
              assert report['iterations'] == 1024
              assert report['warmup_iterations'] == 32
              assert report['input_codepoints'] == 47662
              assert report['odd_level_units'] == 29789
              assert report['mirrored_property_hits'] == 8937
              assert report['exact_character_requests'] == 2979
              assert report['best_fit_character_requests'] == 2979
              assert report['glyph_only_requests'] == 2979
              assert report['output_requests'] == 8937
              assert report['request_record_bytes'] == 12
              assert report['request_hard_limit_bytes'] == 110592
              assert report['request_current_bytes'] == 107244
              assert report['request_peak_bytes'] == 107244
              assert report['request_current_bytes'] == (
                  report['output_requests'] * report['request_record_bytes']
              )
              assert report['p50_ms'] <= report['p95_ms'] <= report['p99_ms'] <= report['maximum_ms']
              assert report['rejected_reservations'] == 0
              assert report['accounting_errors'] == 0
              assert report['within_hard_limits'] is True
              assert report['accounting_clean'] is True

          certification = {
              'schema': 'zevryon.bidi-mirroring-certification.v1',
              'unicode_version': '17.0.0',
              'runs': len(reports),
              'median_p50_ms': statistics.median(r['p50_ms'] for r in reports),
              'median_p95_ms': statistics.median(r['p95_ms'] for r in reports),
              'median_p99_ms': statistics.median(r['p99_ms'] for r in reports),
              'worst_maximum_ms': max(r['maximum_ms'] for r in reports),
              'worst_peak_bytes': max(r['request_peak_bytes'] for r in reports),
              'output_requests': reports[0]['output_requests'],
              'passed': True,
          }
          assert certification['median_p95_ms'] <= 1.10
          assert certification['median_p99_ms'] <= 1.50
          assert certification['worst_maximum_ms'] <= 3.00
          assert certification['worst_peak_bytes'] <= 110592
          (root / 'z1-bidi-mirroring-certification.json').write_text(
              json.dumps(certification, indent=2, sort_keys=True) + '\n'
          )
          print(json.dumps(certification, indent=2, sort_keys=True))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: z1-bidi-mirroring-runtime-${{ github.sha }}
          path: evidence/
          if-no-files-found: warn

  macos-runtime-strict:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build focused runtime targets
        run: |
          set -o pipefail
          cmake --build build --parallel 2 --target \
            zevryon-bidi-mirroring-tests \
            zevryon-bidi-mirroring-conformance \
            zevryon-bidi-mirroring-benchmark \
            2>&1 | tee macos-bidi-mirroring-runtime-build.log
      - run: ctest --test-dir build -R bidi-mirroring-tests --output-on-failure
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-bidi-mirroring-runtime-${{ github.sha }}
          path: macos-bidi-mirroring-runtime-build.log
          if-no-files-found: warn

  windows-runtime-asan:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Configure MSVC AddressSanitizer
        run: cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_TESTING=ON -DZEVRYON_ENABLE_SANITIZERS=ON
      - name: Build focused runtime target
        shell: pwsh
        run: |
          cmake --build build-asan --config RelWithDebInfo --target zevryon-bidi-mirroring-tests --parallel 2 2>&1 | Tee-Object -FilePath windows-bidi-mirroring-runtime-asan-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Stage MSVC AddressSanitizer runtime
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) { throw 'vswhere.exe not found' }
          $installation = (& $vswhere -latest -products * -property installationPath).Trim()
          if (-not $installation) { throw 'Visual Studio installation not found' }
          $patterns = @(
            "$installation\VC\Tools\MSVC\*\bin\Hostx64\x64\clang_rt.asan*dynamic-x86_64.dll",
            "$installation\VC\Tools\Llvm\x64\bin\clang_rt.asan*dynamic-x86_64.dll"
          )
          $runtimes = @($patterns | ForEach-Object {
            Get-ChildItem -Path $_ -File -ErrorAction SilentlyContinue
          })
          if (-not $runtimes) { throw 'MSVC AddressSanitizer runtime DLL not found' }
          $output = Resolve-Path '.\build-asan\RelWithDebInfo'
          $runtimes | Group-Object Name | ForEach-Object {
            $runtime = $_.Group | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            Copy-Item $runtime.FullName -Destination $output -Force
          }
      - name: Run runtime tests under MSVC AddressSanitizer
        shell: pwsh
        run: |
          $env:ASAN_OPTIONS = 'halt_on_error=1:abort_on_error=1:symbolize=1'
          $env:ASAN_SAVE_DUMPS = 'windows-bidi-mirroring-runtime-asan.dmp'
          $process = Start-Process `
            -FilePath '.\build-asan\RelWithDebInfo\zevryon-bidi-mirroring-tests.exe' `
            -NoNewWindow -Wait -PassThru `
            -RedirectStandardOutput 'windows-bidi-mirroring-runtime-asan.stdout.log' `
            -RedirectStandardError 'windows-bidi-mirroring-runtime-asan.stderr.log'
          "exit_code=$($process.ExitCode)" | Set-Content 'windows-bidi-mirroring-runtime-asan.exit.log'
          Get-Content 'windows-bidi-mirroring-runtime-asan.stdout.log' -ErrorAction SilentlyContinue
          Get-Content 'windows-bidi-mirroring-runtime-asan.stderr.log' -ErrorAction SilentlyContinue
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-bidi-mirroring-runtime-asan-${{ github.sha }}
          path: |
            windows-bidi-mirroring-runtime-asan-build.log
            windows-bidi-mirroring-runtime-asan.*.log
            windows-bidi-mirroring-runtime-asan.dmp
          if-no-files-found: warn
