name: z1-bidi-lifetime-fix

on:
  pull_request:
    paths:
      - '.github/workflows/z1-bidi-lifetime-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Release bidi sequence tables before output allocation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/bidi_resolver.cpp')
          text = path.read_text(encoding='utf-8')
          start_marker = '        std::pmr::vector<std::int32_t> matching_pdi(memory);\n'
          end_marker = '        resolve_implicit_levels(&units, stats);\n'
          declaration = (
              '        const std::uint8_t paragraph_level = direction == ParagraphDirection::Auto\n'
              '            ? decide_paragraph_level(units, 0U, units.size(), matching_pdi)\n'
              '            : static_cast<std::uint8_t>(direction);\n'
          )
          assignment = (
              '        paragraph_level = direction == ParagraphDirection::Auto\n'
              '            ? decide_paragraph_level(units, 0U, units.size(), matching_pdi)\n'
              '            : static_cast<std::uint8_t>(direction);\n'
          )
          if text.count(start_marker) != 1 or text.count(end_marker) != 1:
              raise RuntimeError('resolver lifetime markers are not unique')
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          block = text[start:end]
          if block.count(declaration) != 1:
              raise RuntimeError('paragraph-level declaration not found exactly once')
          block = block.replace(declaration, assignment, 1)
          indented = ''.join('    ' + line for line in block.splitlines(keepends=True))
          replacement = (
              '        std::uint8_t paragraph_level = 0U;\n'
              '        {\n'
              + indented +
              '        }\n'
          )
          path.write_text(
              text[:start] + replacement + text[end:],
              encoding='utf-8',
              newline='\n',
          )
          PY
      - name: Commit exact lifetime reduction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/bidi_resolver.cpp
          git commit -m 'Release bidi temporaries before output allocation'
          git push origin HEAD:${{ github.head_ref }}
