name: z1-bidi-lifetime-fix

on:
  pull_request:
    paths:
      - '.github/workflows/z1-bidi-lifetime-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Release bidi sequence tables before output allocation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/bidi_resolver.cpp')
          text = path.read_text(encoding='utf-8')
          old = '''        std::pmr::vector<std::int32_t> matching_pdi(memory);
          if (!match_isolates(
                  units,
                  &matching_pdi,
                  memory,
                  error)) {
              return false;
          }
          const std::uint8_t paragraph_level = direction == ParagraphDirection::Auto
              ? decide_paragraph_level(units, 0U, units.size(), matching_pdi)
              : static_cast<std::uint8_t>(direction);
          stats->paragraph_level = paragraph_level;
          apply_explicit_levels(
              &units,
              paragraph_level,
              matching_pdi,
              stats);

          std::pmr::vector<std::uint32_t> visible(memory);
          std::pmr::vector<LevelRun> runs(memory);
          std::pmr::vector<std::int32_t> index_to_run(memory);
          if (!build_level_runs(
                  units,
                  paragraph_level,
                  matching_pdi,
                  &visible,
                  &runs,
                  &index_to_run,
                  stats,
                  error)) {
              return false;
          }
          if (!runs.empty() &&
              !process_isolating_sequences(
                  &units,
                  paragraph_level,
                  matching_pdi,
                  visible,
                  &runs,
                  memory,
                  stats,
                  error)) {
              return false;
          }
          resolve_implicit_levels(&units, stats);
          reset_whitespace_levels(&units, paragraph_level);
          return write_outputs(units, resolved_levels, visual_order, error);
          '''
          new = '''        std::uint8_t paragraph_level = 0U;
          {
              std::pmr::vector<std::int32_t> matching_pdi(memory);
              if (!match_isolates(
                      units,
                      &matching_pdi,
                      memory,
                      error)) {
                  return false;
              }
              paragraph_level = direction == ParagraphDirection::Auto
                  ? decide_paragraph_level(units, 0U, units.size(), matching_pdi)
                  : static_cast<std::uint8_t>(direction);
              stats->paragraph_level = paragraph_level;
              apply_explicit_levels(
                  &units,
                  paragraph_level,
                  matching_pdi,
                  stats);

              std::pmr::vector<std::uint32_t> visible(memory);
              std::pmr::vector<LevelRun> runs(memory);
              std::pmr::vector<std::int32_t> index_to_run(memory);
              if (!build_level_runs(
                      units,
                      paragraph_level,
                      matching_pdi,
                      &visible,
                      &runs,
                      &index_to_run,
                      stats,
                      error)) {
                  return false;
              }
              if (!runs.empty() &&
                  !process_isolating_sequences(
                      &units,
                      paragraph_level,
                      matching_pdi,
                      visible,
                      &runs,
                      memory,
                      stats,
                      error)) {
                  return false;
              }
          }
          resolve_implicit_levels(&units, stats);
          reset_whitespace_levels(&units, paragraph_level);
          return write_outputs(units, resolved_levels, visual_order, error);
          '''
          if text.count(old) != 1:
              raise RuntimeError(f'expected one resolver lifetime block, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')
          PY
      - name: Commit exact lifetime reduction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/bidi_resolver.cpp
          git commit -m 'Release bidi temporaries before output allocation'
          git push origin HEAD:${{ github.head_ref }}
