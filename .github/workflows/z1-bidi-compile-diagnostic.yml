name: z1-bidi-compile-diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/z1-bidi-compile-diagnostic.yml'
      - 'CMakeLists.txt'
      - 'src/bidi_*'
      - 'src/unicode_bidi*'
      - 'src/resource_ledger.*'
      - 'tests/bidi_*'
  workflow_dispatch:

concurrency:
  group: z1-bidi-compile-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gcc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build bidi targets with complete log
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --parallel 2 --target \
            zevryon-bidi-resolver-tests \
            zevryon-bidi-test-conformance \
            zevryon-bidi-character-conformance \
            zevryon-bidi-benchmark \
            2>&1 | tee bidi-gcc-build.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bidi-gcc-build-${{ github.sha }}
          path: bidi-gcc-build.log
          if-no-files-found: error

  msvc:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build bidi targets with complete log
        shell: pwsh
        run: |
          cmake --build build --config Release --target `
            zevryon-bidi-resolver-tests `
            zevryon-bidi-test-conformance `
            zevryon-bidi-character-conformance `
            zevryon-bidi-benchmark `
            --parallel 2 2>&1 | Tee-Object -FilePath bidi-msvc-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bidi-msvc-build-${{ github.sha }}
          path: bidi-msvc-build.log
          if-no-files-found: error
